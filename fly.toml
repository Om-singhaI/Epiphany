# Fly.io deployment config for Epiphany.
# App name is set at create time; deploy with:  flyctl deploy
app = "epiphany-ds"
primary_region = "sjc"

[build]

[env]
  APP_ENV = "production"
  RUN_AUTONOMOUS_LOOP = "true"
  AUTONOMOUS_INTERVAL_SECONDS = "45"

[http_service]
  internal_port = 8000
  force_https = true
  # The agent runs a perpetual background loop, so keep one machine always on
  # (and only one, so the SQLite history + dashboard state stay consistent).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
